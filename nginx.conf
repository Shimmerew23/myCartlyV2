events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    # ── Rate limiting zones ──────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m  rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=20r/m;

    # ── Gzip ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript application/xml;

    # ── Upstream services ─────────────────────────────────────────
    upstream auth_service        { server auth-service:3001; }
    upstream user_service        { server user-service:3002; }
    upstream product_service     { server product-service:3003; }
    upstream order_service       { server order-service:3004; }
    upstream cart_service        { server cart-service:3005; }
    upstream review_service      { server review-service:3006; }
    upstream warehouse_service   { server warehouse-service:3007; }
    upstream admin_service       { server admin-service:3008; }
    upstream upload_service      { server upload-service:3010; }
    upstream frontend            { server frontend:80; }

    # ── Shared proxy headers macro (via map trick) ────────────────
    # Applied per-location below

    server {
        listen 80;
        server_name localhost;

        # ── Security headers ──────────────────────────────────────
        add_header X-Frame-Options       "SAMEORIGIN"   always;
        add_header X-Content-Type-Options "nosniff"     always;
        add_header X-XSS-Protection      "1; mode=block" always;
        add_header Referrer-Policy       "strict-origin" always;

        # ── Helper: common proxy settings ────────────────────────
        # (duplicated per location — nginx has no macro support without lua)

        # ── Auth service (/api/auth/) ─────────────────────────────
        location /api/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass         http://auth_service;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── User service (/api/users/) ────────────────────────────
        location /api/users/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://user_service;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Product service (/api/products/, /api/categories/) ────
        location /api/products/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass         http://product_service;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        location /api/categories/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://product_service;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Order service (/api/orders/) ──────────────────────────
        # Stripe webhook needs raw body — pass through without buffering
        location /api/orders/webhook {
            proxy_pass              http://order_service;
            proxy_http_version      1.1;
            proxy_set_header        Host              $host;
            proxy_set_header        X-Real-IP         $remote_addr;
            proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header        X-Forwarded-Proto $scheme;
            proxy_request_buffering off;
            proxy_read_timeout      30s;
        }

        location /api/orders/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://order_service;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Cart service (/api/cart/) ─────────────────────────────
        location /api/cart/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://cart_service;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Review service (/api/reviews/) ────────────────────────
        # nginx routes /api/reviews/:productId/* → review-service
        location /api/reviews/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://review_service;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Warehouse service (/api/warehouse/, /api/carriers/) ───
        location /api/warehouse/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://warehouse_service;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        location /api/carriers/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://warehouse_service;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Admin service (/api/admin/, /api/feedback/) ───────────
        location /api/admin/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://admin_service;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        location /api/feedback/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://admin_service;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Upload service (/api/upload/) ─────────────────────────
        location /api/upload/ {
            limit_req zone=upload burst=5 nodelay;
            proxy_pass              http://upload_service;
            proxy_http_version      1.1;
            proxy_set_header        Host              $host;
            proxy_set_header        X-Real-IP         $remote_addr;
            proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header        X-Forwarded-Proto $scheme;
            proxy_request_buffering off;
            proxy_read_timeout      120s;
            client_max_body_size    30M;
        }

        # ── Health checks (aggregate — each service also has /health) ──
        location /health {
            access_log off;
            return 200 '{"status":"healthy","gateway":"nginx"}';
            add_header Content-Type application/json;
        }

        # ── Frontend → React/Vite build ───────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   Upgrade         $http_upgrade;
            proxy_set_header   Connection      'upgrade';
            proxy_cache_bypass $http_upgrade;
        }
    }
}
