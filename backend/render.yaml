services:
  - type: web
    name: mcartly-backend
    env: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://mcartly.vercel.app
      - key: PORT
        value: 10000
